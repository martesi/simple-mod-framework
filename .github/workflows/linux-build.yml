name: Linux Build

# Builds the CLI and the Mod Manager GUI for Linux, using the flake.nix
# devshell as the sole source of toolchain versions (Node, Rust, Electron's
# runtime libraries). Unlike the Windows workflows, nothing is ever installed
# globally on the runner - every step runs inside `nix develop`, the same
# environment a contributor gets locally with `nix develop`.

on:
  push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            Mod Manager/node_modules
          key: linux-build-npm-${{ hashFiles('package-lock.json', 'Mod Manager/package-lock.json') }}

      - name: Install root dependencies
        run: nix develop --command npm install

      - name: Build CLI (Rust addon + TypeScript + Linux binary)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: nix develop --command npm run build:linux

      - name: Install GUI dependencies
        run: nix develop --command bash -c 'cd "Mod Manager" && npm install'

      - name: Build GUI
        run: nix develop --command bash -c 'cd "Mod Manager" && npm run build:linux'

      # Regression check: launch the packaged app headlessly and confirm it
      # actually renders a page instead of crashing or hanging. This is the
      # same check used to validate the Linux build works at all - see
      # flake.nix / the Mod Manager Linux build for context.
      - name: Smoke test the packaged GUI
        run: |
          nix develop --command bash -c '
            set -e
            mkdir -p "Mod Manager/dist/Mods" "Mod Manager/dist/Retail"
            echo "{ loadOrder: [], modOptions: {}, runtimePath: \"../Retail/Runtime\" }" > "Mod Manager/dist/config.json"
            cp Deploy.exe "Mod Manager/dist/Deploy.exe"
            cd "Mod Manager/dist/linux-unpacked"
            xvfb-run --auto-servernum -s "-screen 0 1280x800x24" \
              ./modmanager --no-sandbox --disable-gpu --disable-dev-shm-usage --remote-debugging-port=9222 &
            APP_PID=$!
            for i in $(seq 1 20); do
              if curl -sf http://127.0.0.1:9222/json > /tmp/cdp-targets.json 2>/dev/null; then break; fi
              sleep 1
            done
            kill "$APP_PID" 2>/dev/null || true
            if ! grep -q "\"type\": \"page\"" /tmp/cdp-targets.json 2>/dev/null; then
              echo "GUI did not open a page within the timeout" >&2
              exit 1
            fi
            echo "GUI launched and rendered a page successfully"
          '

      - name: Assemble dist
        run: nix develop --command npm run assemble:linux

      - name: Fetch hitman-hashes
        run: |
          nix develop --command bash -c '
            curl -sL -o latest-hashes.7z "https://github.com/glacier-modding/hitman-hashes/releases/latest/download/latest-hashes.7z"
            7z x latest-hashes.7z -o./dist/Third-Party
          '

      - name: Zip
        run: |
          cd dist
          zip -r ../Release-linux.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: Output-Linux
          path: Release-linux.zip
