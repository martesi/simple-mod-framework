name: Create Artifact

on:
  push

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          default: true

      - name: Set up 7-Zip
        uses: milliewalky/setup-7-zip@ce4c26956d369e4cce6c1a7c114a4ed6c98f458f

      - name: Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: buildCachev26

      - name: Cache
        id: cache2
        uses: actions/cache@v4
        with:
          path: Mod Manager/node_modules
          key: buildCache2v21

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          npm install

      # All build steps below run through package.json scripts (build:rust,
      # build:cli, build:exe:win) rather than ad hoc shell commands, so that
      # `npm run build:win` does the same thing here as it does locally -
      # nothing is installed globally on the runner.
      - name: Build EXE
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          npm run build:win

      - name: Install GUI dependencies
        if: steps.cache2.outputs.cache-hit != 'true'
        run: |
          cd "Mod Manager"
          npm install
          cd ../

      - name: Build GUI
        run: |
          cd "Mod Manager"
          npm run build:win
          cd ../

      - name: Assemble dist
        run: |
          npm run assemble:win

      - name: Fetch hitman-hashes
        run: |
          Invoke-WebRequest -Uri "https://github.com/glacier-modding/hitman-hashes/releases/latest/download/latest-hashes.7z" -OutFile "latest-hashes.7z"
          7z x "latest-hashes.7z" -o"./dist/Third-Party"

      - name: Zip
        uses: TheDoctor0/zip-release@4fb9e4ff72847dd3d1c111cf63834e353ed7cb3d
        with:
          filename: Release.zip
          directory: dist

      - uses: actions/upload-artifact@v4
        with:
          name: Output
          path: dist/Release.zip
